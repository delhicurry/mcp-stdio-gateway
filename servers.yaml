servers:
  kintone:
    command: "npx"
    args: ["-y", "@kintone/mcp-server"]
    env_keys:
      - "KINTONE_BASE_URL"
      - "KINTONE_API_TOKEN"

  github:
    command: "npx"
    args: ["-y", "@modelcontextprotocol/server-github"]
    env_keys:
      - "GITHUB_PERSONAL_ACCESS_TOKEN"

  slack:
    command: "npx"
    args: ["-y", "@modelcontextprotocol/server-slack"]
    env_keys:
      - "SLACK_BOT_TOKEN"
      - "SLACK_TEAM_ID"

  # Add any other stdio MCP server here.
  # The gateway will expose it automatically at /mcp/{server_name}/tools
